<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your connections on MentorConnect">
  <title>Connections | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css?v=1777295329266">
</head>

<body onload="loadLayout('Connections'); loadConnections();">

<div class="layout">
  <div id="sidebar"></div>

  <div class="main">
    <div id="navbar"></div>

    <section class="content">

      <!-- requests from other people waiting for you to accept or reject -->
      <div class="card">
        <h3>Pending Requests</h3>
        <div id="requests"></div>
      </div>

      <!-- requests YOU sent that are still pending -->
      <div class="card">
        <h3>Sent Requests</h3>
        <div id="sentRequests"></div>
      </div>

      <!-- people you're already connected with -->
      <div class="card">
        <div class="section-header">
          <h3>My Connections</h3>
        </div>
        <input
          type="text"
          id="connectionSearch"
          placeholder="Search connections..."
          oninput="searchConnections()"
          style="margin-bottom: 16px;"
        />
        <div id="connections"></div>
      </div>

    </section>
  </div>

</div>

<script src="../js/main.js?v=1777295329266"></script>

</body>
</html>
