<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your MentorConnect account">
  <title>Register | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join MentorConnect today</p>

      <input id="name" type="text" placeholder="Full Name" />
      <input id="email" type="email" placeholder="Email address" />
      <input id="password" type="password" placeholder="Password (min 6 characters)" />

      <select id="role">
        <option value="">Select your role</option>
        <option value="mentor">Mentor</option>
        <option value="entrepreneur">Entrepreneur</option>
      </select>

      <button onclick="register()" class="auth-btn">Register</button>

      <p class="auth-footer">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="../js/main.js"></script>

</body>
</html>
