<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your MentorConnect account">
  <title>Register | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css?v=1777295329266">
</head>

<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join MentorConnect today</p>

      <input id="name" type="text" placeholder="Full Name" />
      <input id="email" type="email" placeholder="Email address" />

      <div style="position:relative; margin-bottom:16px;">
        <input id="password" type="password" placeholder="Password (min 6 characters)" style="margin-bottom:0; padding-right:44px;" />
        <button type="button"
          onclick="togglePasswordVisibility('password','pwEye1')"
          tabindex="-1"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                 background:transparent; border:none; padding:4px; cursor:pointer;
                 font-size:17px; line-height:1; color:#a8a29e; width:auto;
                 box-shadow:none; display:flex; align-items:center;">
          <span id="pwEye1">👁</span>
        </button>
      </div>

      <div style="position:relative; margin-bottom:16px;">
        <input id="confirmPassword" type="password" placeholder="Confirm Password" style="margin-bottom:0; padding-right:44px;" />
        <button type="button"
          onclick="togglePasswordVisibility('confirmPassword','pwEye2')"
          tabindex="-1"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                 background:transparent; border:none; padding:4px; cursor:pointer;
                 font-size:17px; line-height:1; color:#a8a29e; width:auto;
                 box-shadow:none; display:flex; align-items:center;">
          <span id="pwEye2">👁</span>
        </button>
      </div>

      <select id="role">
        <option value="">Select your role</option>
        <option value="mentor">Mentor</option>
        <option value="entrepreneur">Entrepreneur</option>
      </select>

      <button onclick="register()" class="auth-btn">Register</button>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="../js/main.js?v=1777295329266"></script>

</body>
</html>
