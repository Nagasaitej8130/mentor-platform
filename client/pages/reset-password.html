<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your MentorConnect password">
  <title>Reset Password | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css?v=1777295329266">
</head>

<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Set New Password</h2>
      <p class="auth-subtitle">Enter your new password below</p>

      <div class="password-wrapper">
        <input id="newPassword" type="password" placeholder="New password (min 6 characters)" />
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPassword', 'toggleIcon1')" tabindex="-1">
          <span id="toggleIcon1">👁</span>
        </button>
      </div>

      <div class="password-wrapper">
        <input id="confirmNewPassword" type="password" placeholder="Confirm new password" />
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmNewPassword', 'toggleIcon2')" tabindex="-1">
          <span id="toggleIcon2">👁</span>
        </button>
      </div>

      <button onclick="resetPassword()" class="auth-btn">Reset Password</button>

      <p class="auth-footer">
        <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>

  <script src="../js/main.js?v=1777295329266"></script>

</body>
</html>
