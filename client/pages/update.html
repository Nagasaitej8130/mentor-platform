<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Update your MentorConnect profile">
  <title>Update Profile | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body onload="loadLayout('Update Profile'); loadUpdateForm();">

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <section class="content">

      <div class="card profile-card">
        <h3>Edit Profile</h3>

        <!-- COMMON -->
        <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Name</label>
        <input id="u_name" placeholder="Your full name" />

        <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Bio</label>
        <textarea id="u_bio" placeholder="Tell us about yourself"></textarea>

        <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Skills</label>
        <input id="u_skills" placeholder="e.g. JavaScript, Python, Marketing" />

        <!-- MENTOR -->
        <div id="u_mentorFields" style="display:none;">
          <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">
          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Company</label>
          <input id="u_company" placeholder="Company name" />

          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Experience (years)</label>
          <input id="u_exp" type="number" placeholder="e.g. 5" />

          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Expertise</label>
          <input id="u_expertise" placeholder="e.g. AI, Cloud, Leadership" />
        </div>

        <!-- ENTREPRENEUR -->
        <div id="u_entrepreneurFields" style="display:none;">
          <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">
          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Startup Name</label>
          <input id="u_startup" placeholder="Your startup name" />

          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Idea</label>
          <input id="u_idea" placeholder="Describe your idea" />

          <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Industry</label>
          <input id="u_industry" placeholder="e.g. FinTech, HealthTech" />
        </div>

        <div class="profile-actions" style="margin-top:20px;">
          <button onclick="updateProfile()">Save Changes</button>
          <button class="btn-outline" onclick="window.location.href='profile.html'">Cancel</button>
        </div>

      </div>

      <div class="card profile-card" style="margin-top: 24px;">
        <h3>Change Password</h3>
        
        <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">Current Password</label>
        <input type="password" id="u_current_password" placeholder="Enter current password" />

        <label style="font-size:13px;color:#64748b;font-weight:600;margin-bottom:4px;display:block;">New Password</label>
        <input type="password" id="u_new_password" placeholder="Enter new password (min 6 chars)" />

        <div class="profile-actions" style="margin-top:20px;">
          <button onclick="changePassword(event)">Update Password</button>
        </div>
      </div>

    </section>

  </div>

</div>

<script src="../js/main.js"></script>

</body>
</html>
