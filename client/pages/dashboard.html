<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MentorConnect Dashboard - Find mentors, view meetings and suggestions">
  <title>Dashboard | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css?v=1777295329266">
</head>

<body onload="loadLayout('Dashboard'); loadDashboard();">

<div class="layout">
  <div id="sidebar"></div>

  <div class="main">
    <div id="navbar"></div>

    <section class="content">

      <!-- dashboard stats: welcome message + quick numbers -->
      <div class="card" id="dashboardStats">
        <div id="statsContent"><p style="color:var(--text-muted);font-size:14px;">Loading...</p></div>
      </div>

      <!-- search bar to find mentors or entrepreneurs -->
      <div class="card">
        <h3>Find Mentors / Entrepreneurs</h3>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by name, email or skill..." />
          <button onclick="handleSearch()">Search</button>
        </div>
        <div id="searchResults"></div>
      </div>

      <!-- people the algorithm suggests based on matching skills -->
      <div class="card">
        <h3>Suggested Connections</h3>
        <div id="suggestions"></div>
      </div>

      <!-- upcoming scheduled meetings -->
      <div class="card">
        <h3>Upcoming Meetings</h3>
        <div id="meetings"></div>
      </div>

    </section>
  </div>

</div>

<script src="../js/main.js?v=1777295329266"></script>

</body>
</html>
