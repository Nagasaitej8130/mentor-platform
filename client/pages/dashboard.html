<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h2>Dashboard</h2>

  <div style="position:relative;">
    <button onclick="toggleNotifications()">🔔</button>
    <span id="notifCount" style="color:red; font-weight:bold;"></span>

    <div id="notifDropdown" style="
      display:none;
      position:absolute;
      right:0;
      background:white;
      border:1px solid #ccc;
      width:250px;
      max-height:300px;
      overflow-y:auto;
      padding:10px;
    ">
    </div>
  </div>
</div>

<h3>Suggestions</h3>
<div id="suggestions"></div>

<h3>Meetings</h3>
<div id="meetings"></div>

<script src="../js/main.js"></script>

</body>
</html>
