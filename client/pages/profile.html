<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your MentorConnect profile">
  <title>Profile | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body onload="loadLayout('Profile'); loadProfile();">

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <section class="content">

      <div class="card profile-card">
        <h3>Your Profile</h3>

        <div class="profile-field">
          <span class="profile-label">Name</span>
          <span class="profile-value" id="p_name">-</span>
        </div>

        <div class="profile-field">
          <span class="profile-label">Email</span>
          <span class="profile-value" id="p_email">-</span>
        </div>

        <div class="profile-field">
          <span class="profile-label">Role</span>
          <span class="profile-value" id="p_role">-</span>
        </div>

        <div class="profile-field">
          <span class="profile-label">Bio</span>
          <span class="profile-value" id="p_bio">-</span>
        </div>

        <div class="profile-field">
          <span class="profile-label">Skills</span>
          <span class="profile-value" id="p_skills">-</span>
        </div>

        <!-- Mentor Fields -->
        <div id="mentorFields" style="display:none;">
          <div class="profile-field">
            <span class="profile-label">Company</span>
            <span class="profile-value" id="p_company">-</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Experience</span>
            <span class="profile-value" id="p_exp">-</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Expertise</span>
            <span class="profile-value" id="p_expertise">-</span>
          </div>
        </div>

        <!-- Entrepreneur Fields -->
        <div id="entrepreneurFields" style="display:none;">
          <div class="profile-field">
            <span class="profile-label">Startup</span>
            <span class="profile-value" id="p_startup">-</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Idea</span>
            <span class="profile-value" id="p_idea">-</span>
          </div>
          <div class="profile-field">
            <span class="profile-label">Industry</span>
            <span class="profile-value" id="p_industry">-</span>
          </div>
        </div>

        <div class="profile-actions">
          <button onclick="goToUpdate()">Edit Profile</button>
          <button class="btn-danger" onclick="logout()">Logout</button>
        </div>
      </div>

    </section>

  </div>

</div>

<script src="../js/main.js"></script>

</body>
</html>
