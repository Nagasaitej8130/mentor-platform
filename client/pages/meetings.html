<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Schedule and manage meetings on MentorConnect">
  <title>Meetings | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body onload="loadLayout('Meetings'); loadMeetingsPage();">

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <section class="content">

      <!-- CREATE MEETING -->
      <div class="card">
        <h3>Schedule a Meeting</h3>

        <div class="meeting-form">
          <select id="participantId" class="full-width">
            <option value="">Select a connection</option>
          </select>

          <input id="date" type="date" />
          <input id="time" type="time" />

          <input id="link" type="url" placeholder="Meeting link (e.g. Zoom, Google Meet)" class="full-width" />

          <div class="full-width">
            <button onclick="createMeeting()">Schedule Meeting</button>
          </div>
        </div>
      </div>

      <!-- MEETINGS LIST -->
      <div class="card">
        <h3>Your Meetings</h3>
        <div id="meetingsList"></div>
      </div>

    </section>

  </div>

</div>

<script src="../js/main.js"></script>

</body>
</html>
