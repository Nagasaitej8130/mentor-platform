<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with your connections on MentorConnect">
  <title>Chat | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body onload="loadLayout('Chat'); loadChat();">

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- CHAT LAYOUT -->
    <div class="chat-layout">

      <!-- LEFT: USER LIST -->
      <div class="chat-users">
        <div class="chat-users-header">
          <h4>Conversations</h4>
          <input
            type="text"
            id="chatSearch"
            placeholder="Search conversations..."
            oninput="filterChatUsers()"
          />
        </div>
        <div id="users"></div>
      </div>

      <!-- RIGHT: CHAT BOX -->
      <div class="chat-box">

        <!-- Placeholder when no chat selected -->
        <div class="chat-placeholder" id="chatPlaceholder">
          <p>Select a conversation to start chatting</p>
        </div>

        <!-- Active chat area (hidden by default) -->
        <div id="chatActive">
          <div class="chat-header">
            <span class="chat-header-dot"></span>
            <span id="chatUserName">Select a user</span>
          </div>

          <ul id="messages"></ul>

          <div class="chat-input">
            <input
              id="message"
              type="text"
              placeholder="Type a message..."
            />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="../js/main.js"></script>

</body>
</html>
