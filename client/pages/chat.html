<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with your connections on MentorConnect">
  <title>Chat | MentorConnect</title>
  <link rel="stylesheet" href="../css/style.css?v=1777295329266">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body onload="loadLayout('Chat'); loadChat();">

<div class="layout">

  <!-- sidebar gets loaded dynamically -->
  <div id="sidebar"></div>

  <!-- main content area -->
  <div class="main">

    <!-- navbar loaded dynamically -->
    <div id="navbar"></div>

    <!-- chat interface - split into user list and message area -->
    <div class="chat-layout">

      <!-- list of connected users you can chat with -->
      <div class="chat-users">
        <div class="chat-users-header">
          <h4>Conversations</h4>
          <input
            type="text"
            id="chatSearch"
            placeholder="Search conversations..."
            oninput="filterChatUsers()"
          />
        </div>
        <div id="users"></div>
      </div>

      <!-- the actual chat area where messages appear -->
      <div class="chat-box">

        <!-- shown when no conversation is selected yet -->
        <div class="chat-placeholder" id="chatPlaceholder">
          <p>Select a conversation to start chatting</p>
        </div>

        <!-- this part shows up once you pick someone to chat with -->
        <div id="chatActive">
          <div class="chat-header">
            <span class="chat-header-dot"></span>
            <span id="chatUserName">Select a user</span>
          </div>

          <ul id="messages"></ul>

          <!-- typing indicator shown when the other person is typing -->
          <div id="typingIndicator" class="typing-indicator" style="display:none;">typing...</div>

          <div class="chat-input">
            <input
              id="message"
              type="text"
              placeholder="Type a message..."
            />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="../js/main.js?v=1777295329266"></script>

</body>
</html>
