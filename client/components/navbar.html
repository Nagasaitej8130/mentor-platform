<header class="navbar">
  <div style="display: flex; align-items: center; gap: 12px;">
    <button class="mobile-toggle" onclick="toggleSidebar()" style="display: none; background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-primary);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <h3 id="pageTitle">Dashboard</h3>
  </div>
  <div class="nav-right">
    <div class="notif-wrapper">
      <button id="notifBell" onclick="toggleNotifications()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span id="notifCount"></span>
      </button>
      <div id="notifDropdown"></div>
    </div>
    <span class="user-badge" id="currentUserName"></span>
  </div>
</header>
